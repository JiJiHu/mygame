<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#87CEEB"/>

  <!-- Sea -->
  <rect x="0" y="100" width="200" height="50" fill="#4A90E2"/>

  <!-- Hull -->
  <path d="M30,80 Q100,40 170,80 L170,100 Q100,80 30,100 Z" fill="#8B4513"/>

  <!-- Mast -->
  <rect x="95" y="30" width="10" height="70" fill="#A9A9A9"/>

  <!-- Sail -->
  <path d="M105,40 Q140,50 140,90 L105,90 Z" fill="white"/>

  <!-- Skull on sail -->
  <text x="120" y="70" text-anchor="middle" font-size="20" fill="black">☠</text>

  <!-- Flag -->
  <path d="M105,30 L120,20 L120,35 Z" fill="black"/>
</svg>